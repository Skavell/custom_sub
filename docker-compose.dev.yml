services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      # Prevent Windows .venv from overwriting the Linux venv built inside the image
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://skavellion:password@postgres:5432/skavellion
      - REDIS_URL=redis://redis:6379/0

volumes:
  backend_venv:
