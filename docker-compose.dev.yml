services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      # Prevent Windows .venv from overwriting the Linux venv built inside the image
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://skavellion:password@postgres:5432/skavellion
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-32-chars-minimum-here
      - SETTINGS_ENCRYPTION_KEY=dev-enc-key-32-chars-here-padding!

volumes:
  backend_venv:
